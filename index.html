<!DOCTYPE html>
<html lang="ja">
<head>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
      -webkit-user-select: none;
    }
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: #0f172a;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
      -webkit-user-select: none;
    }
    .game-wrapper {
      position: relative; display: flex; flex-direction: column;
      align-items: stretch; gap: 8px;
      touch-action: manipulation;
      overscroll-behavior: none;
    }
    .info { font-size: 12px; color: #c0c0ff; text-align: center; line-height: 1.5; }
    .canvas-wrap { position: relative; display: inline-block; align-self: center; }
    canvas {
      background: transparent; border-radius: 16px;
      border: 2px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.08);

    #mobile-controls { display: none; }

    .controls { display: flex; justify-content: center; gap: 16px; margin-top: 8px; }

      min-width: 80px; padding: 8px 12px; border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      background: radial-gradient(circle at top, rgba(148, 163, 255, 0.25), rgba(15, 23, 42, 0.9));

      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);

    .ctrl-btn span { font-weight: 600; letter-spacing: 0.05em; }
    .retry-btn {
      padding: 6px 14px; border-radius: 999px; border: 2px solid rgba(248, 250, 252, 0.95);
      background: linear-gradient(135deg, #a855f7, #7c3aed); color: #ffffff;

      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(15, 23, 42, 0.7);

      background: rgba(15, 23, 42, 0.88); flex-direction: column; gap: 12px; z-index: 10;
    }
    .start-brand-logo {
      position: absolute; top: 24px; left: 10px; z-index: 11;
      display: block; line-height: 0; opacity: 0.95;
    }
    .start-brand-logo img {
      display: block; height: 80px; width: auto; max-width: min(320px, 84vw);
      object-fit: contain; pointer-events: none;
    }
    .start-brand-logo:active { opacity: 0.85; }
    /* position:relative は付けない。付けると .overlay の position:absolute を上書きし、トップ画面が縦並びでキャンバス下に回り込む */
    .start-screen { display: flex; }

      padding: 24px 20px; border-radius: 18px;

    .primary-btn {
      padding: 8px 18px; border-radius: 999px; border: 2px solid rgba(248, 250, 252, 0.95);

    #btn-start:disabled {

    .kamiki-ver {
      font-size: 18px;

      font-style: italic;
      color: #ffffff;
      text-align: center;
      margin-bottom: 12px;

    @keyframes orange-neon {

    .new-record-badge {

        0 0 4px #fff,

    @keyframes neon-pulse {

      to { opacity: 1; text-shadow: 0 0 6px #fff, 0 0 12px #fff, 0 0 24px #a855f7, 0 0 48px #a855f7, 0 0 90px #7c3aed; }

    .transition-overlay {
      position: fixed; inset: 0; background: #000000;

    .dom-particle {

      box-shadow: 0 0 8px currentColor;
      animation: burst-anim 0.6s cubic-bezier(0.1, 1, 0.3, 1) forwards;
    }
    @keyframes burst-anim {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }
  </style>

<body>

  <script>
    (function () {
      document.addEventListener("touchmove", function (event) {
        if (event.touches && event.touches.length >= 2) event.preventDefault();
        if (event.scale !== undefined && event.scale !== 1) event.preventDefault();
      }, { passive: false });
      const SUPABASE_URL = "https://hefayilffszrczxhnpii.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhlZmF5aWxmZnN6cmN6eGhucGlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NDI5NDEsImV4cCI6MjA4NzUxODk0MX0.qUsuQOIZzdlFLXtR-i1d9TX5c3P9QKPdhv34QGt4V_k";
      let supabaseClient = null;
      function getSupabaseClient() {
        if (!supabaseClient && window.supabase && SUPABASE_URL && SUPABASE_ANON_KEY) {
          supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }
        return supabaseClient;
      }
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const width = canvas.width;
      const height = canvas.height;

      const gravity = 0.35;
      const jumpVelocity = -9;

      let audioCtx = null;
      function getAudioCtx() {
        if (!audioCtx) {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (AC) audioCtx = new AC();
        }
        return audioCtx;
      }

      const bgmAudio = new Audio("play.mp3");
      bgmAudio.loop = true;
      bgmAudio.preload = "auto";
      const BGM_BASE_VOLUME = 0.16;
      let bgmFadeRaf = 0;

      function cancelBgmFade() {
        if (bgmFadeRaf) {
          cancelAnimationFrame(bgmFadeRaf);
          bgmFadeRaf = 0;
        }
      }

      function startBgm() {
        cancelBgmFade();
        bgmAudio.volume = BGM_BASE_VOLUME;
        bgmAudio.currentTime = 0;
        const p = bgmAudio.play();
        if (p && typeof p.catch === "function") p.catch(function () { /* ユーザー操作前などで再生不可の場合は無視 */ });
      }

      function stopBgmImmediate() {
        cancelBgmFade();
        bgmAudio.pause();
        bgmAudio.currentTime = 0;
        bgmAudio.volume = BGM_BASE_VOLUME;
      }

      function fadeOutBgm(durationMs) {
        cancelBgmFade();
        if (bgmAudio.paused) return;
        const fadeMs = Math.max(100, Number(durationMs) || 1200);
        const startVolume = bgmAudio.volume;
        const startedAt = performance.now();
        function tick(nowMs) {
          const t = Math.min(1, (nowMs - startedAt) / fadeMs);
          bgmAudio.volume = Math.max(0, startVolume * (1 - t));
          if (t < 1) {
            bgmFadeRaf = requestAnimationFrame(tick);
          } else {
            bgmFadeRaf = 0;
            bgmAudio.pause();
            bgmAudio.currentTime = 0;
            bgmAudio.volume = BGM_BASE_VOLUME;
          }
        }
        bgmFadeRaf = requestAnimationFrame(tick);
      }

      function playJumpSound() {
        const ctxA = getAudioCtx();
        if (!ctxA) return;
        const osc = ctxA.createOscillator();
        const gain = ctxA.createGain();
        osc.type = "triangle";
        const now = ctxA.currentTime;
        osc.frequency.setValueAtTime(260, now);
        osc.frequency.exponentialRampToValueAtTime(780, now + 0.25);
        gain.gain.setValueAtTime(0.0, now);
        gain.gain.linearRampToValueAtTime(0.35, now + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
        osc.connect(gain).connect(ctxA.destination);
        osc.start(now);
        osc.stop(now + 0.4);
      }

      function playLandSound() {
        const ctxA = getAudioCtx();
        if (!ctxA) return;
        const osc = ctxA.createOscillator();
        const gain = ctxA.createGain();
        osc.type = "sine";
        const now = ctxA.currentTime;
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(70, now + 0.12);
        gain.gain.setValueAtTime(0.0, now);
        gain.gain.linearRampToValueAtTime(0.6, now + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        osc.connect(gain).connect(ctxA.destination);
        osc.start(now);
        osc.stop(now + 0.3);
      }

      function playIceCrackSound() {
        const ctxA = getAudioCtx();
        if (!ctxA) return;
        const osc = ctxA.createOscillator();
        const gain = ctxA.createGain();
        osc.type = "sine";
        const now = ctxA.currentTime;
        osc.frequency.setValueAtTime(2600, now);
        gain.gain.setValueAtTime(0.0, now);
        gain.gain.linearRampToValueAtTime(0.35, now + 0.002);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.012);
        osc.connect(gain).connect(ctxA.destination);
        osc.start(now);
        osc.stop(now + 0.015);
      }

      function playIceBreakSound() {
        const ctxA = getAudioCtx();
        if (!ctxA) return;
        const now = ctxA.currentTime;
        const freqs = [2000, 2700, 3500, 2400, 3100];
        const oscs = freqs.map(function (f) {
          const o = ctxA.createOscillator();
          o.type = "sine";
          o.frequency.setValueAtTime(f, now);
          o.frequency.exponentialRampToValueAtTime(f * 0.4, now + 0.25);
          return o;
        });
        const gainOsc = ctxA.createGain();
        gainOsc.gain.setValueAtTime(0.0, now);
        gainOsc.gain.linearRampToValueAtTime(0.28, now + 0.008);
        gainOsc.gain.exponentialRampToValueAtTime(0.001, now + 0.32);
        oscs.forEach(function (o) {
          o.connect(gainOsc);
          o.start(now);
          o.stop(now + 0.35);
        });
        gainOsc.connect(ctxA.destination);
        const bufferSize = ctxA.sampleRate * 0.35;
        const buffer = ctxA.createBuffer(1, bufferSize, ctxA.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.4;
        const noise = ctxA.createBufferSource();
        noise.buffer = buffer;
        const gainNoise = ctxA.createGain();
        gainNoise.gain.setValueAtTime(0.0, now);
        gainNoise.gain.linearRampToValueAtTime(0.2, now + 0.01);
        gainNoise.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
        noise.connect(gainNoise).connect(ctxA.destination);
        noise.start(now);
        noise.stop(now + 0.35);
      }

      let windSoundNodes = null;
      function ensureWindSoundNodes() {
        if (windSoundNodes) return windSoundNodes;
        const ctxA = getAudioCtx();
        if (!ctxA) return null;
        const noiseBufferSize = Math.max(1, Math.floor(ctxA.sampleRate * 2));
        const noiseBuffer = ctxA.createBuffer(1, noiseBufferSize, ctxA.sampleRate);
        const data = noiseBuffer.getChannelData(0);
        for (let i = 0; i < noiseBufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }
        const noise = ctxA.createBufferSource();
        noise.buffer = noiseBuffer;
        noise.loop = true;
        const hp = ctxA.createBiquadFilter();
        hp.type = "highpass";
        hp.frequency.setValueAtTime(350, ctxA.currentTime);
        const bp = ctxA.createBiquadFilter();
        bp.type = "bandpass";
        bp.frequency.setValueAtTime(900, ctxA.currentTime);
        bp.Q.setValueAtTime(0.7, ctxA.currentTime);
        const gain = ctxA.createGain();
        gain.gain.setValueAtTime(0.0, ctxA.currentTime);
        noise.connect(hp).connect(bp).connect(gain).connect(ctxA.destination);
        noise.start();
        windSoundNodes = { noise: noise, gain: gain };
        return windSoundNodes;
      }

      function updateWindSound(force) {
        const nodes = ensureWindSoundNodes();
        if (!nodes) return;
        const ctxA = getAudioCtx();
        if (!ctxA) return;
        const now = ctxA.currentTime;
        const intensity = Math.min(1, Math.abs(force) / 4);
        const targetGain = intensity > 0.02 ? 0.05 + intensity * 0.12 : 0.0;
        nodes.gain.gain.cancelScheduledValues(now);
        nodes.gain.gain.setValueAtTime(nodes.gain.gain.value, now);
        nodes.gain.gain.linearRampToValueAtTime(targetGain, now + 0.08);
      }

      const player = { x: width / 2, y: height - 80, width: 40, height: 80, vy: 0, onGround: false };
      
      const platforms = [];
      let particles = [];
      
      const PLATFORM_COUNT = 12;
      const MAX_JUMP_HEIGHT = (jumpVelocity * jumpVelocity) / (2 * gravity);
      const FIRST_GAP = MAX_JUMP_HEIGHT * 0.55;
      const Y_GAP_MARGIN = 50;
      const MAX_Y_GAP = Math.max(40, MAX_JUMP_HEIGHT - Y_GAP_MARGIN);
      const PLATFORM_GAP = Math.min(MAX_JUMP_HEIGHT * 0.6, MAX_Y_GAP);
      const PLATFORM_WIDTH = 70;
      const PLATFORM_HEIGHT = 12;
      const RED_JUMP_MULTIPLIER = Math.sqrt(5);
      const MOVING_PLATFORM_SPEED = 2.0; // 1.3倍にアップ

      const ojisanImg = new Image();
      ojisanImg.src = "透過済.png";
      let ojisanLoaded = false;
      ojisanImg.onload = () => { ojisanLoaded = true; };
      const ojisanImg1 = new Image();
      ojisanImg1.src = "透過済1.png";
      let ojisanLoaded1 = false;
      ojisanImg1.onload = () => { ojisanLoaded1 = true; };
      const ojisanImg2 = new Image();
      ojisanImg2.src = "透過済2.png";
      let ojisanLoaded2 = false;
      ojisanImg2.onload = () => { ojisanLoaded2 = true; };

      const bgImg = new Image();
      bgImg.src = "背景.jpg";
      let bgImgLoaded = false;
      bgImg.onload = () => { bgImgLoaded = true; };

      let cameraOffsetY = 0;
      let currentStep = 0;
      let minPlayerY = 0; // スコア計算のための最高到達点
      let startY = 0;     // スタート時のY座標

      let bestStep = 0;
      let previousBest = 0;

      const heightEl = document.getElementById("height");
      const bestEl = document.getElementById("best");
      const resultCurrentEl = document.getElementById("result-current");
      const resultBestEl = document.getElementById("result-best");
      const resultNicknameEl = document.getElementById("result-nickname");
      const newRecordBadgeEl = document.getElementById("new-record-badge");

      if (heightEl) heightEl.textContent = currentStep.toString();
      if (bestEl) bestEl.textContent = "0";

      let rankingDataByNickname = {};

      let leftPressed = false, rightPressed = false;
      let paused = false, gameOver = false, gameStarted = false, playerName = "";

      // 宇宙の突風用
      let windForce = 0;      // 現在の風の強さ（正:右、負:左）
      let windTimer = 0;      // 風が吹いている残りフレーム数
      let windParticles = []; // 風の視覚エフェクト

      function resetGame() {
        player.x = width / 2;
        player.y = height - 80;
        player.vy = 0;
        player.onGround = true;
        
        startY = player.y;
        minPlayerY = player.y;
        cameraOffsetY = 0;
        currentStep = 0;
        if (heightEl) heightEl.textContent = "0";
        resultCurrentEl.textContent = "0";
        if (newRecordBadgeEl) newRecordBadgeEl.style.display = "none";

        leftPressed = false; rightPressed = false;
        paused = false; gameOver = false;

        platforms.length = 0;
        particles.length = 0;
        windForce = 0;
        windTimer = 0;
        windParticles.length = 0;
        updateWindSound(0);

        const bottomY = height - 40;
        platforms.push({ x: width / 2 - PLATFORM_WIDTH / 2, y: bottomY, width: PLATFORM_WIDTH, height: PLATFORM_HEIGHT, type: 'normal', hp: 1, vx: 0 });

        let currentY = bottomY - FIRST_GAP;
        platforms.push(createRandomPlatform(currentY));

        // 画面上部の見えない位置まで、十分な数の足場を先読み生成する
        const bufferHeight = height * 2;
        while (bottomY - currentY < bufferHeight) {
          currentY -= PLATFORM_GAP;
          platforms.push(createRandomPlatform(currentY));
        }
      }

      function createRandomPlatform(y) {
        const r = Math.random();
        let type = 'normal';
        let vx = 0;
        let hp = 1;

        if (currentStep <= 100) {
          // 100段以下：従来どおりの出現確率
          // 50段以上なら20%の確率で氷の足場（耐久2）
          if (currentStep >= 50 && r < 0.20) {
            type = 'ice';
            hp = 2;
          } else if (r < 0.35) {
            // 赤い足場 15%
            type = 'red';
          } else if (r < 0.95) {
            // 動く足場 60%：速度バリエーション 0.5 / 1.0 / 1.5 倍（標準多め）、100段超えでさらに1.5倍
            const rand = Math.random();
            const mult = rand < 0.25 ? 0.5 : rand < 0.75 ? 1.0 : 1.5;
            const baseSpeed = MOVING_PLATFORM_SPEED * mult * (currentStep >= 100 ? 1.5 : 1.0);
            vx = Math.random() < 0.5 ? baseSpeed : -baseSpeed;
          }
        } else {
          // 100段を超えた場合：動かない通常足場は出現させない
          const r2 = Math.random();
          if (r2 < 0.30) {
            // 氷の足場 30%
            type = 'ice';
            hp = 2;
          } else if (r2 < 0.40) {
            // 赤い足場 10%
            type = 'red';
          } else {
            // 残り 60% は動く足場
            type = 'normal'; // 動きのみを持つ通常色の足場
            const rand = Math.random();
            const mult = rand < 0.25 ? 0.5 : rand < 0.75 ? 1.0 : 1.5;
            const baseSpeed = MOVING_PLATFORM_SPEED * mult * 1.5;
            vx = Math.random() < 0.5 ? baseSpeed : -baseSpeed;
          }
        }

        return { x: Math.random() * (width - PLATFORM_WIDTH), y, width: PLATFORM_WIDTH, height: PLATFORM_HEIGHT, type, hp, vx };
      }

      function spawnParticles(x, y, color) {
        for(let i=0; i<15; i++) {
          particles.push({
            x: x, y: y,
            vx: (Math.random()-0.5)*8,
            vy: (Math.random()-0.5)*8,
            life: 30 + Math.random()*10,
            color: color
          });
        }
      }

      function updatePhysics() {
        if (!gameStarted || paused) {
          updateWindSound(0);
          return;
        }

        // 150段以降：たまに短時間だけ吹く突風
        if (windTimer > 0) {
          windTimer--;
          if (windTimer === 0) {
            windForce = 0;
          }
        } else if (currentStep > 150) {
          // 無風のときだけ、低確率で突風を発生させる
          if (Math.random() < 0.003) {
            const dir = Math.random() < 0.5 ? -1 : 1;
            const mag = 2 + Math.random() * 2; // 2〜4
            windForce = dir * mag;
            windTimer = 30 + Math.floor(Math.random() * 13); // 約0.5〜0.7秒間（60FPS想定）
          }
        }
        updateWindSound(windForce);

        // --- 1. 高度ベースのスコア計算 ---
        if (player.y < minPlayerY) {
          minPlayerY = player.y;
          // 初期位置からどれだけ登ったかをGAPで割って段数を算出
          let calcStep = Math.floor((startY - minPlayerY) / PLATFORM_GAP);
          if (calcStep > currentStep) {
            currentStep = calcStep;
            if (heightEl) heightEl.textContent = currentStep.toString();
            if (currentStep > bestStep) {
              bestStep = currentStep;
              if (bestEl) bestEl.textContent = bestStep.toString();
            }
          }
        }

        const moveSpeed = 4;
        if (leftPressed) player.x -= moveSpeed;
        if (rightPressed) player.x += moveSpeed;

        // 3. X座標を常に [0, width) に正規化（トーラス状ラップ）
        player.x = (player.x % width + width) % width;

        const halfW = player.width / 2;

        player.vy += gravity;
        player.y += player.vy;

        // 動く足場の更新
        for (const p of platforms) {
          if (p.vx) {
            p.x += p.vx;
            // X座標を常に [0, width) に正規化（トーラス状ラップ）
            p.x = (p.x % width + width) % width;
          }
        }

        player.onGround = false;
        if (player.vy >= 0) {
          const tolerance = 6;
          for (let i = 0; i < platforms.length; i++) {
            const p = platforms[i];
            const playerBottom = player.y + player.height / 2;
            const playerPrevBottom = playerBottom - player.vy;
            // 1. 画面左右端を跨いだ場合も含めたX方向当たり判定
            const offsets = [0, -width, width];
            let withinX = false;
            for (let k = 0; k < offsets.length; k++) {
              const px = player.x + offsets[k];
              if (px + halfW > p.x && px - halfW < p.x + p.width) {
                withinX = true;
                break;
              }
            }
            const crossingDown = playerPrevBottom <= p.y + tolerance && playerBottom >= p.y - tolerance;
            
            if (withinX && crossingDown) {
              player.y = p.y - player.height / 2;
              playLandSound();

              // 氷の足場の処理
              if (p.type === 'ice') {
                p.hp -= 1;
                if (p.hp === 1) {
                  playIceCrackSound();
                } else if (p.hp <= 0) {
                  playIceBreakSound();
                  spawnParticles(p.x + p.width/2, p.y + p.height/2, '#bae6fd');
                  platforms.splice(i, 1);
                }
              }

              const multiplier = (p.type === 'red') ? RED_JUMP_MULTIPLIER : 1;
              player.vy = jumpVelocity * multiplier;
              player.onGround = false;
              playJumpSound();
              break;
            }
          }
        }

        // 空中にいる間だけ風の影響を受ける（突風が吹いているときのみ）
        if (windForce !== 0 && player.vy !== 0) {
          player.x += windForce;
          player.x = (player.x % width + width) % width;
        }

        const midY = height * 0.5;
        const screenY = player.y - cameraOffsetY;
        if (screenY < midY && player.vy < 0) {
          const overshoot = midY - screenY;
          const upSpeed = Math.min(overshoot, -player.vy);
          cameraOffsetY -= upSpeed;
        }

        // 足場の再生成＆先読みループ
        for (let i = 0; i < platforms.length; i++) {
          const p = platforms[i];
          // 画面のかなり下まで落ちた足場は、列の一番上に再利用する
          if (p.y - cameraOffsetY > height + 80) {
            const currentMinY = Math.min(...platforms.map(pl => pl.y));
            const newPlat = createRandomPlatform(currentMinY - PLATFORM_GAP);
            platforms[i] = newPlat;
          }
        }

        // カメラより上方向に、常に十分な足場が先読み生成されている状態を維持する
        const bufferHeight = height * 2;
        let currentMinY = Math.min(...platforms.map(pl => pl.y));
        while (cameraOffsetY - currentMinY < bufferHeight) {
          currentMinY -= PLATFORM_GAP;
          platforms.push(createRandomPlatform(currentMinY));
        }

        if (!gameOver && player.y - cameraOffsetY > height + 80) {
          gameOver = true;
          paused = true;
          showResultScreen();
        }
      }

      let starPositions = [];

      function lerpColor(c1, c2, t) {
        t = Math.max(0, Math.min(1, t));
        const r = Math.round(c1.r + (c2.r - c1.r) * t);
        const g = Math.round(c1.g + (c2.g - c1.g) * t);
        const b = Math.round(c1.b + (c2.b - c1.b) * t);
        return "rgb(" + r + "," + g + "," + b + ")";
      }

      function drawBackground() {
        const step = currentStep;

        // 背景画像が読み込まれていればそれを描画、まだならシンプルなグラデーションでフォールバック
        if (bgImgLoaded) {
          ctx.drawImage(bgImg, 0, 0, width, height);
        } else {
          const grad = ctx.createLinearGradient(0, 0, 0, height);
          grad.addColorStop(0, "#0f172a");
          grad.addColorStop(1, "#020617");
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, width, height);
        }

        // 星（宇宙）の演出：300段から500段にかけてフェードイン（背景画像の上に重ねる）
        const starProgress = Math.min(1, Math.max(0, (step - 300) / 200));
        if (starProgress <= 0) return;

        if (starPositions.length === 0) {
          for (let i = 0; i < 48; i++) {
            starPositions.push({
              x: ((i * 13.7 + 31) % (width + 20)) - 10,
              y: ((i * 19.3 + 47) % (height + 20)) - 10,
              r: 0.6 + (i % 4) * 0.35,
              phase: i * 0.7
            });
          }
        }
        const twinkle = Date.now() / 400;
        starPositions.forEach(function (s) {
          const baseAlpha = starProgress;
          const alpha = baseAlpha * (0.5 + 0.5 * Math.sin(twinkle + s.phase));
          ctx.fillStyle = "rgba(255, 255, 255, " + alpha + ")";
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      function drawWind() {
        if (Math.abs(windForce) <= 0.1) return;
        const speed = windForce * 3;
        if (Math.random() < 0.4) {
          windParticles.push({
            x: windForce > 0 ? -30 : width + 30,
            y: Math.random() * height,
            len: 15 + Math.random() * 25,
            alpha: 0.2 + Math.random() * 0.3
          });
        }
        ctx.save();
        for (let i = windParticles.length - 1; i >= 0; i--) {
          const p = windParticles[i];
          p.x += speed;
          if (p.x < -50 || p.x > width + 50) {
            windParticles.splice(i, 1);
            continue;
          }
          ctx.strokeStyle = "rgba(255, 255, 255, " + p.alpha + ")";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p.x + (windForce > 0 ? p.len : -p.len), p.y);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawPlatforms() {
        function renderPlatform(drawX, drawY, p) {
          const x = drawX; const w = p.width; const h = p.height;
          ctx.save();
          const radius = 6; const baseY = drawY;
          let baseGradient = ctx.createLinearGradient(x, baseY, x, baseY + h);
          
          if (p.type === 'red') {
            baseGradient.addColorStop(0, "#fecaca"); baseGradient.addColorStop(0.5, "#f87171"); baseGradient.addColorStop(1, "#b91c1c");
          } else if (p.type === 'ice') {
            baseGradient.addColorStop(0, "#bae6fd"); baseGradient.addColorStop(0.5, "#7dd3fc"); baseGradient.addColorStop(1, "#38bdf8");
          } else {
            baseGradient.addColorStop(0, "#a16207"); baseGradient.addColorStop(0.5, "#92400e"); baseGradient.addColorStop(1, "#713f12");
          }
          ctx.fillStyle = baseGradient;
          ctx.beginPath();
          ctx.moveTo(x + radius, baseY); ctx.lineTo(x + w - radius, baseY);
          ctx.quadraticCurveTo(x + w, baseY, x + w, baseY + radius);
          ctx.lineTo(x + w, baseY + h - radius);
          ctx.quadraticCurveTo(x + w, baseY + h, x + w - radius, baseY + h);
          ctx.lineTo(x + radius, baseY + h); ctx.quadraticCurveTo(x, baseY + h, x, baseY + h - radius);
          ctx.lineTo(x, baseY + radius); ctx.quadraticCurveTo(x, baseY, x + radius, baseY);
          ctx.fill();

          // すべての足場に太めの黒い縁取りを追加
          ctx.strokeStyle = "#000000";
          ctx.lineWidth = 4;
          ctx.stroke();

          // 氷のヒビ割れ描画（耐久2なので hp===1 の時のみ）
          if (p.type === 'ice' && p.hp < 2) {
            ctx.strokeStyle = "rgba(255, 255, 255, 0.9)";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(x + w/2, baseY); ctx.lineTo(x + w/2 + 10, baseY + h/2); ctx.lineTo(x + w/2 - 5, baseY + h);
            ctx.stroke();
          }

          if (p.type !== 'ice') {
            ctx.strokeStyle = p.type === 'red' ? "rgba(254, 242, 242, 0.4)" : "rgba(249, 250, 251, 0.3)";
            ctx.lineWidth = 1;
            for (let i = 1; i <= 2; i++) {
              const yy = baseY + (h / 3) * i;
              ctx.beginPath(); ctx.moveTo(x + 4, yy);
              ctx.quadraticCurveTo(x + w / 2, yy + (i % 2 === 0 ? 1.5 : -1.5), x + w - 4, yy);
              ctx.stroke();
            }
          }

          ctx.restore();
        }

        for (const p of platforms) {
          const y = p.y - cameraOffsetY;
          if (y < -40 || y > height + 40) continue;

          // 基本の描画
          renderPlatform(p.x, y, p);
          // 右にはみ出した分を左側にも描画
          if (p.x + p.width > width) {
            renderPlatform(p.x - width, y, p);
          }
          // 左にはみ出した分を右側にも描画
          if (p.x < 0) {
            renderPlatform(p.x + width, y, p);
          }
        }
      }

      function drawParticles() {
        ctx.save();
        for (let i = particles.length - 1; i >= 0; i--) {
          let p = particles[i];
          p.x += p.vx; p.y += p.vy; p.life--;
          if (p.life <= 0) {
            particles.splice(i, 1);
            continue;
          }
          ctx.globalAlpha = p.life / 40;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y - cameraOffsetY, 3, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawPlayer() {
        const px = player.x;
        const py = player.y - cameraOffsetY;
        const feetY = py + player.height / 2;

        function drawSinglePlayerAt(drawX) {
          ctx.save();
          ctx.translate(drawX, feetY);
          var imgToDraw = ojisanImg;
          var imgLoaded = ojisanLoaded;
          var sizeScale = 1;
          if (player.vy > 1.5 && player.vy < 6) {
            imgToDraw = ojisanImg1;
            imgLoaded = ojisanLoaded1;
            sizeScale = 0.95;
          } else if (player.vy >= 6) {
            imgToDraw = ojisanImg2;
            imgLoaded = ojisanLoaded2;
            sizeScale = 0.7;
          }
          if (imgLoaded) {
            const imgW = imgToDraw.width;
            const imgH = imgToDraw.height;
            const targetHeight = player.height * 1.5 * sizeScale;
            const aspect = imgW / imgH;
            const targetWidth = targetHeight * aspect;
            ctx.drawImage(imgToDraw, -targetWidth / 2, -targetHeight, targetWidth, targetHeight);
          } else {
            ctx.fillStyle = "#7c3aed";
            ctx.fillRect(-player.width / 2, -player.height, player.width, player.height);
          }
          ctx.restore();
        }

        // メインの描画
        drawSinglePlayerAt(px);
        // 2. 画面端でのラップアラウンド描画（デュアルレンダリング）
        const halfW = player.width / 2;
        if (px < halfW) {
          drawSinglePlayerAt(px + width);
        } else if (px > width - halfW) {
          drawSinglePlayerAt(px - width);
        }
      }

      function drawScoreOverlay() {
        ctx.save();
        const text = currentStep + " 段";
        ctx.font = "bold 32px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        const x = width / 2;
        const y = 45;
        // 白い太めの縁取り
        ctx.strokeStyle = "white";
        ctx.lineWidth = 4;
        ctx.strokeText(text, x, y);
        // 中身を鮮やかな赤で塗りつぶし
        ctx.fillStyle = "#ff3333";
        ctx.fillText(text, x, y);
        ctx.restore();
      }

      async function showResultScreen() {
        fadeOutBgm(1400);
        const overEl = document.getElementById("game-over");
        if (overEl) overEl.style.display = "flex";
        const gw = document.querySelector(".game-wrapper");
        if (gw) gw.classList.remove("game-playing");
        var gameOverImgs = ["GAMEOVER.png", "GAMEOVER1.png", "GAMEOVER2.png", "GAMEOVER3.png", "GAMEOVER4.png", "GAMEOVER5.png", "GAMEOVER6.png", "GAMEOVER7.png", "GAMEOVER8.png", "GAMEOVER9.png", "GAMEOVER10.png", "GAMEOVER11.png", "GAMEOVER12.png", "GAMEOVER13.png", "GAMEOVER14.png", "GAMEOVER15.png"];
        var gameOverImgEl = document.getElementById("game-over-img");
        if (gameOverImgEl) {
          var idx = Math.floor(Math.random() * gameOverImgs.length);
          var chosen = gameOverImgs[idx];
          gameOverImgEl.src = "";
          var tripleSizeImgs = ["GAMEOVER3.png", "GAMEOVER8.png", "GAMEOVER10.png", "GAMEOVER15.png"];
          var doubleSizeImgs = ["GAMEOVER5.png", "GAMEOVER6.png", "GAMEOVER7.png", "GAMEOVER11.png", "GAMEOVER12.png", "GAMEOVER14.png"];
          gameOverImgEl.classList.remove("game-over-img-1_5x", "game-over-img-double", "game-over-img-triple");
          if (tripleSizeImgs.indexOf(chosen) >= 0) {
            gameOverImgEl.classList.add("game-over-img-triple");
          } else if (doubleSizeImgs.indexOf(chosen) >= 0) {
            gameOverImgEl.classList.add("game-over-img-double");
          } else {
            gameOverImgEl.classList.add("game-over-img-1_5x");
          }
          gameOverImgEl.src = chosen;
        }
        resultCurrentEl.textContent = currentStep.toString();
        resultBestEl.textContent = bestStep.toString();
        resultNicknameEl.textContent = playerName ? `プレイヤー: ${playerName}` : "プレイヤー: ななしさん";
        if (newRecordBadgeEl) {
          if (currentStep > previousBest) {
            newRecordBadgeEl.style.display = "block";
          } else {
            newRecordBadgeEl.style.display = "none";
          }
        }
        const client = getSupabaseClient();
        if (client) {
          try {
            await client.from("scores").insert({
              nickname: (playerName || "").trim() || "ななしさん",
              score: currentStep
            });
          } catch (_err) { /* 送信失敗時は無視 */ }
        }
      }

      function loop() {
        updatePhysics();
        ctx.clearRect(0, 0, width, height);
        drawBackground();
        drawWind();
        drawPlatforms();
        drawParticles();
        drawPlayer();
        drawScoreOverlay();
        requestAnimationFrame(loop);
      }

      window.addEventListener("keydown", function (e) {
        if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") leftPressed = true;
        else if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") rightPressed = true;
        else if (e.key === "t" || e.key === "T") goToTop();
        else if (e.key === "r" || e.key === "R") {
          if (gameOver && gameOverEl) {
            previousBest = bestStep;
            resetGame();
            gameOverEl.style.display = "none";
          }
        }
      });
      window.addEventListener("keyup", function (e) {
        if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") leftPressed = false;
        else if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") rightPressed = false;
      });

      // 画面の左右タップで移動
      function handlePointerDown(clientX) {
        const center = window.innerWidth / 2;
        if (clientX < center) {
          leftPressed = true;
          rightPressed = false;
        } else {
          rightPressed = true;
          leftPressed = false;
        }
      }
      function handlePointerUp() {
        leftPressed = false;
        rightPressed = false;
      }

      function isGamePlayTouchTarget(el) {
        return !!(el && el.closest && el.closest("button, input, textarea, select, a[href], label, [contenteditable='true']"));
      }

      window.addEventListener("mousedown", function (e) {
        handlePointerDown(e.clientX);
      });
      window.addEventListener("mouseup", function () {
        handlePointerUp();
      });
      window.addEventListener("touchstart", function (e) {
        if (!e.touches || e.touches.length === 0) return;
        const gw = document.querySelector(".game-wrapper");
        if (gw && gw.classList.contains("game-playing") && !isGamePlayTouchTarget(e.target)) {
          e.preventDefault();
        }
        const touch = e.touches[0];
        handlePointerDown(touch.clientX);
      }, { passive: false });
      window.addEventListener("touchend", function () {
        handlePointerUp();
      });
      window.addEventListener("touchcancel", function () {
        handlePointerUp();
      });

      const btnRetry = document.getElementById("btn-retry");
      const btnTop = document.getElementById("btn-top");
      const gameOverEl = document.getElementById("game-over");
      const btnGameOverRetry = document.getElementById("btn-gameover-retry");
      const btnResultTop = document.getElementById("btn-result-top");
      const startScreenEl = document.getElementById("start-screen");
      const btnStart = document.getElementById("btn-start");
      const nicknameInput = document.getElementById("nickname-input");
      const topRankingListEl = document.getElementById("top-ranking-list");
      const rankTitleTextEl = document.getElementById("rank-title-text");
      const rankPrevEl = document.getElementById("rank-prev");
      const rankNextEl = document.getElementById("rank-next");
      const rankingModes = [
        { id: "daily", name: "今日のランキング" },
        { id: "weekly", name: "週間ランキング" },
        { id: "all", name: "歴代ランキング" }
      ];
      let currentRankingModeIndex = 0;

      function updateBestScoreDisplay() {
        const nick = (nicknameInput && nicknameInput.value ? nicknameInput.value : "").trim();
        const score = nick && rankingDataByNickname[nick] ? Number(rankingDataByNickname[nick].score) : 0;
        bestStep = score;
        if (bestEl) bestEl.textContent = score.toString();
      }

      function getRankingDateFrom() {
        const mode = rankingModes[currentRankingModeIndex];
        if (mode.id === "all") return null;
        const now = new Date();
        if (mode.id === "daily") {
          const today = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0, 0);
          return today.toISOString();
        }
        if (mode.id === "weekly") {
          const d = new Date(now);
          const day = d.getDay();
          const diff = day === 0 ? -6 : 1 - day;
          d.setDate(d.getDate() + diff);
          d.setHours(0, 0, 0, 0);
          return d.toISOString();
        }
        return null;
      }

      async function loadTopRanking() {
        if (!topRankingListEl) return;
        if (rankTitleTextEl) rankTitleTextEl.textContent = rankingModes[currentRankingModeIndex].name;
        topRankingListEl.innerHTML = "";
        const client = getSupabaseClient();
        if (!client) {
          topRankingListEl.appendChild(createRankingLi("rank-4plus", "ランキングを読み込めません"));
          rankingDataByNickname = {};
          updateBestScoreDisplay();
          return;
        }
        try {
          const dateFrom = getRankingDateFrom();
          /* 取得上限: 3000件（データ途切れ防止のため十分な数） */
          let query = client.from("scores").select("nickname, score" + (dateFrom ? ", created_at" : "")).order("score", { ascending: false }).limit(3000);
          if (dateFrom) query = query.gte("created_at", dateFrom);
          const { data, error } = await query;
          if (error) {
            topRankingListEl.appendChild(createRankingLi("rank-4plus", "取得できませんでした"));
            rankingDataByNickname = {};
            updateBestScoreDisplay();
            return;
          }
          const rows = data || [];
          const byName = {};
          rows.forEach(function (row) {
            const n = (row.nickname || "").trim() || "ななし";
            if (!(n in byName) || byName[n].score < row.score) byName[n] = { nickname: n, score: Number(row.score) };
          });
          rankingDataByNickname = byName;
          const unique = Object.keys(byName).map(function (k) { return byName[k]; });
          unique.sort(function (a, b) { return b.score - a.score; });
          console.log("現在の期間のユニークプレイヤー数:", unique.length);
          const top100 = unique.slice(0, 100);
          if (top100.length === 0) {
            topRankingListEl.appendChild(createRankingLi("rank-4plus", "まだ記録がありません"));
            updateBestScoreDisplay();
            return;
          }
          top100.forEach(function (row, i) {
            const prevScore = i > 0 ? top100[i - 1].score : null;
            const displayRank = (i > 0 && row.score === prevScore) ? top100[i - 1]._displayRank : (i + 1);
            row._displayRank = displayRank;
            const medal = displayRank === 1 ? "🥇" : displayRank === 2 ? "🥈" : displayRank === 3 ? "🥉" : "";
            const cls = displayRank === 1 ? "rank-1" : displayRank === 2 ? "rank-2" : displayRank === 3 ? "rank-3" : "rank-4plus";
            const rankText = displayRank + "位 ";
            const text = medal ? medal + " " + rankText + row.nickname + " … " + row.score + " 段" : rankText + row.nickname + " … " + row.score + " 段";
            topRankingListEl.appendChild(createRankingLi(cls, text));
          });
          updateBestScoreDisplay();
        } catch (err) {
          topRankingListEl.appendChild(createRankingLi("rank-4plus", "読み込みに失敗しました"));
          updateBestScoreDisplay();
        }
      }

      function createRankingLi(className, text) {
        const li = document.createElement("li");
        li.className = className;
        li.textContent = text;
        return li;
      }

      if (rankPrevEl) {
        rankPrevEl.addEventListener("click", function () {
          currentRankingModeIndex = (currentRankingModeIndex - 1 + rankingModes.length) % rankingModes.length;
          if (rankTitleTextEl) rankTitleTextEl.textContent = rankingModes[currentRankingModeIndex].name;
          loadTopRanking();
        });
      }
      if (rankNextEl) {
        rankNextEl.addEventListener("click", function () {
          currentRankingModeIndex = (currentRankingModeIndex + 1) % rankingModes.length;
          if (rankTitleTextEl) rankTitleTextEl.textContent = rankingModes[currentRankingModeIndex].name;
          loadTopRanking();
        });
      }

      function playStartTransition(e, callback) {
        var x = e.clientX != null ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : window.innerWidth / 2);
        var y = e.clientY != null ? e.clientY : (e.touches && e.touches[0] ? e.touches[0].clientY : window.innerHeight / 2);
        var colors = ["#a855f7", "#7c3aed", "#fb8500", "#ffb703", "#ffffff", "#38bdf8"];
        var particles = [];
        var count = 60 + Math.floor(Math.random() * 21);
        for (var i = 0; i < count; i++) {
          var el = document.createElement("div");
          el.className = "dom-particle";
          el.style.left = x + "px";
          el.style.top = y + "px";
          var size = 4 + Math.floor(Math.random() * 15);
          el.style.width = size + "px";
          el.style.height = size + "px";
          var angle = Math.random() * Math.PI * 2;
          var radius = 50 + Math.random() * 300;
          var tx = radius * Math.cos(angle);
          var ty = radius * Math.sin(angle);
          el.style.setProperty("--tx", tx + "px");
          el.style.setProperty("--ty", ty + "px");
          var c = colors[Math.floor(Math.random() * colors.length)];
          el.style.background = c;
          el.style.color = c;
          document.body.appendChild(el);
          particles.push(el);
        }
        var overlay = document.getElementById("transition-overlay");
        if (overlay) overlay.style.opacity = "1";
        setTimeout(function () {
          if (typeof callback === "function") callback();
          setTimeout(function () {
            if (overlay) overlay.style.opacity = "0";
            setTimeout(function () {
              particles.forEach(function (p) { if (p.parentNode) p.remove(); });
            }, 700);
          }, 50);
        }, 500);
      }

      if (btnRetry) btnRetry.addEventListener("click", function () {
        previousBest = bestStep;
        resetGame();
        startBgm();
        if (gameOverEl) gameOverEl.style.display = "none";
        const gw = document.querySelector(".game-wrapper");
        if (gw) gw.classList.add("game-playing");
      });
      btnGameOverRetry.addEventListener("click", function (e) {
        playStartTransition(e, function () {
          previousBest = bestStep;
          resetGame();
          startBgm();
          if (gameOverEl) gameOverEl.style.display = "none";
          var gw = document.querySelector(".game-wrapper");
          if (gw) gw.classList.add("game-playing");
        });
      });
      async function goToTop() {
        stopBgmImmediate();
        gameStarted = false; paused = false; resetGame();
        if (gameOverEl) gameOverEl.style.display = "none";
        if (startScreenEl) startScreenEl.style.display = "flex";
        const gw = document.querySelector(".game-wrapper");
        if (gw) gw.classList.remove("game-playing");
        await loadTopRanking();
      }
      if (btnTop) btnTop.addEventListener("click", function () { goToTop(); });
      btnResultTop.addEventListener("click", function () { goToTop(); });
      btnStart.addEventListener("click", function (e) {
        if (btnStart.disabled) return;
        playStartTransition(e, function () {
          playerName = nicknameInput.value.trim() || "ななしさん";
          localStorage.setItem("murasaki_ojisan_player_name", playerName);
          previousBest = bestStep;
          gameStarted = true; paused = false;
          startBgm();
          if (startScreenEl) startScreenEl.style.display = "none";
          var gw = document.querySelector(".game-wrapper");
          if (gw) gw.classList.add("game-playing");
          resetGame();
        });
      });

      function updateStartButtonState() {
        const v = (nicknameInput && nicknameInput.value ? nicknameInput.value : "").trim();
        btnStart.disabled = v.length === 0;
      }
      if (nicknameInput) {
        nicknameInput.addEventListener("input", function () {
          updateStartButtonState();
          updateBestScoreDisplay();
        });
      }
      updateStartButtonState();

      const savedName = localStorage.getItem("murasaki_ojisan_player_name");
      if (savedName) { playerName = savedName; if (nicknameInput) nicknameInput.value = savedName; updateStartButtonState(); }
      if (startScreenEl) startScreenEl.style.display = "flex";
      resetGame();
      loadTopRanking();
      loop();
    })();
  </script>
</body>
</html>
